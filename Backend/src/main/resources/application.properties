spring.application.name=BookingService
server.port=${app.port:${APP_PORT:8080}}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/BookingAgency}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1342}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=public

spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

spring.jackson.datatype.datetime.write-dates-as-timestamps=false
