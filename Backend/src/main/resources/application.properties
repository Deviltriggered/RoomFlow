spring.application.name=BookingService
server.port=${app.port:${APP_PORT:8080}}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=public

spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

spring.jackson.datatype.datetime.write-dates-as-timestamps=false

app.auth.jwt.secret=${JWT_SECRET}
app.auth.jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL:30m}
app.auth.jwt.refresh-token-ttl=${JWT_REFRESH_TOKEN_TTL:14d}
app.auth.admin-email=${APP_ADMIN_EMAIL:}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
